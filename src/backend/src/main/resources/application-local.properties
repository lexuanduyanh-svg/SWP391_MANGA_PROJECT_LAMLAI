server.port=8080
spring.application.name=manga-workflow-api
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.datasource.url=jdbc:h2:file:${LOCAL_DB_PATH:~/swp391-local-demo-db/manga_workflow};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
app.storage.manuscripts-dir=${MANUSCRIPT_STORAGE_DIR:storage-server/manuscripts}
