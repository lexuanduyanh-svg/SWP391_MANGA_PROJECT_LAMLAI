server.port=8080
spring.application.name=manga-workflow-api
app.cors.allowed-origins=http://localhost:5173
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/manga_workflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
app.storage.manuscripts-dir=${MANUSCRIPT_STORAGE_DIR:storage-server/manuscripts}
